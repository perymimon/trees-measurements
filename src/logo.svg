<svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Ground shadow -->
  <ellipse cx="32" cy="61.5" rx="11" ry="2.5" fill="#1a3d1e" opacity="0.28"/>

  <!-- Trunk -->
  <rect x="27.5" y="43" width="9" height="18" rx="3" fill="#6B3A1F"/>
  <!-- Trunk bark highlight -->
  <rect x="30" y="44.5" width="3" height="15" rx="1.5" fill="#8F5530" opacity="0.5"/>
  <!-- Trunk shadow edge -->
  <rect x="34" y="44.5" width="1.5" height="15" rx="0.75" fill="#3d1f08" opacity="0.3"/>

  <!-- Canopy shadow (depth layer) -->
  <circle cx="32" cy="27" r="22" fill="#1a5620"/>

  <!-- Main canopy -->
  <circle cx="32" cy="25" r="22" fill="#3D9D44"/>

  <!-- Sphere shading gradient -->
  <circle cx="32" cy="25" r="22" fill="url(#shadeGrad)"/>

  <!-- Diffuse highlight blob -->
  <ellipse cx="23" cy="15" rx="12" ry="10" fill="#5DC263" opacity="0.48"/>

  <!-- Specular highlight -->
  <circle cx="20" cy="12" r="5" fill="#88D98C" opacity="0.38"/>
  <circle cx="18.5" cy="10.5" r="2" fill="#b8f0bb" opacity="0.30"/>

  <!-- A few small apples nestled in the canopy -->
  <!-- Apple 1 -->
  <circle cx="39" cy="28" r="3.8" fill="#be3a2a"/>
  <circle cx="39" cy="28" r="2"   fill="#d9564a" opacity="0.6"/>
  <line x1="39" y1="24.2" x2="39.6" y2="26"
        stroke="#3d7a20" stroke-width="1.1" stroke-linecap="round"/>

  <!-- Apple 2 (smaller, partially hidden) -->
  <circle cx="28" cy="34" r="2.8" fill="#b03222" opacity="0.85"/>
  <circle cx="28" cy="34" r="1.4" fill="#cf5044" opacity="0.5"/>

  <!-- Apple 3 (tiny, upper right) -->
  <circle cx="42" cy="19" r="2.2" fill="#c44030" opacity="0.75"/>

  <!-- Leaf accent on apple 1 -->
  <path d="M39.6 24.5 Q42 22 44 23.5 Q42 25 39.6 24.5Z"
        fill="#4a8c25" opacity="0.8"/>

  <defs>
    <radialGradient id="shadeGrad" cx="36%" cy="30%" r="70%">
      <stop offset="0%"   stop-color="#7acc80" stop-opacity="0.0"/>
      <stop offset="100%" stop-color="#0d2e10" stop-opacity="0.38"/>
    </radialGradient>
  </defs>

</svg>
